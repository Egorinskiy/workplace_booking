<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSpace — бронирование рабочих мест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>📚 BookSpace</h1>
        </div>
        <div class="user-panel">
            <div id="user-info" class="user-name"></div>
            <button id="release-my-seat" class="btn-release">Освободить моё место</button>
        </div>
    </header>

    <main>
        <div class="floorplan">
            <div class="block left-block">
                <h2>Левый блок</h2>
                <div class="seats-grid" data-block="left"></div>
            </div>
            <div class="block right-block">
                <h2>Правый блок</h2>
                <div class="seats-grid" data-block="right"></div>
            </div>
            <div class="block glass-block">
                <h2>Кабинет-стекляшка</h2>
                <div class="seats-grid" data-block="glass"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

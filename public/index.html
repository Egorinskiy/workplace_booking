<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронирование рабочих мест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Бронирование мест в опенспейсе</h1>
        <div id="user-info"></div>
        <button id="release-my-seat" style="display:none;">Освободить моё место</button>
    </header>
    <main>
        <div class="floorplan">
            <div class="block left-block">
                <h2>Левый блок</h2>
                <div class="seats-grid" data-block="left"></div>
            </div>
            <div class="block right-block">
                <h2>Правый блок</h2>
                <div class="seats-grid" data-block="right"></div>
            </div>
            <div class="block glass-block">
                <h2>Кабинет-стекляшка</h2>
                <div class="seats-grid" data-block="glass"></div>
            </div>
        </div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>

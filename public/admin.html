<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка | Бронирование мест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Панель администратора</h1>
        <a href="/">Вернуться на главную</a>
        <button id="clear-today">Освободить все места сегодня</button>
    </header>
    <main>
        <h2>Занятые места на сегодня</h2>
        <table id="occupancy-table">
            <thead>
                <tr>
                    <th>ID записи</th>
                    <th>Стол</th>
                    <th>Сотрудник</th>
                    <th>Время</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Простой скрипт для админки (можно вынести в отдельный файл, но для простоты здесь)
        const socket = io();
        socket.on('seats-updated', () => {
            loadOccupancy();
        });

        async function loadOccupancy() {
            const response = await fetch('/api/admin/occupancy');
            const data = await response.json();
            const tbody = document.querySelector('#occupancy-table tbody');
            tbody.innerHTML = '';
            data.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.id}</td>
                    <td>${record.label}</td>
                    <td>${record.name}</td>
                    <td>${new Date(record.date).toLocaleDateString()}</td>
                    <td><button onclick="deleteRecord(${record.id})">Удалить</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        async function deleteRecord(id) {
            if (!confirm('Удалить запись?')) return;
            await fetch(`/api/admin/occupancy/${id}`, { method: 'DELETE' });
            loadOccupancy();
        }

        document.getElementById('clear-today').addEventListener('click', async () => {
            if (!confirm('Освободить все места сегодня?')) return;
            await fetch('/api/admin/clear-today', { method: 'POST' });
            loadOccupancy();
        });

        loadOccupancy();
    </script>
</body>
</html>
